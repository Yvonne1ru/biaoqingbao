      // еҠ иҪҪз”ЁжҲ·йҖүжӢ©
      function loadSelection() {
        const saved = localStorage.getItem('emojiMakerSelection');
        if (saved) return JSON.parse(saved);
        return {
          stickers: fullStickerLibrary.map((_, i) => i),
          kaomoji: fullKaomojiLibrary.map((_, i) => i)
        };
      }

      let userSelection = loadSelection();

      function saveSelection() {
        localStorage.setItem('emojiMakerSelection', JSON.stringify(userSelection));
      }

      function getSelectedStickers() {
        return userSelection.stickers.map(i => fullStickerLibrary[i]).filter(Boolean);
      }

      function getSelectedKaomoji() {
        return userSelection.kaomoji.map(i => fullKaomojiLibrary[i]).filter(Boolean);
      }

      // е·Ҙе…·еҲҮжҚў
      function setTool(tool) {
        currentTool = tool;
        canvas.isDrawingMode = (tool === 'brush');
        canvas.selection = (tool === 'select' || tool === 'text');
        if (tool === 'brush') {
          canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
          canvas.freeDrawingBrush.color = drawingColor;
          canvas.freeDrawingBrush.width = brushThickness;
        }
        document.querySelectorAll('#toolbar .tool-btn').forEach(b => b.classList.remove('active'));
        if (tool === 'select') document.getElementById('selectTool').classList.add('active');
        else if (tool === 'brush') document.getElementById('brushTool').classList.add('active');
        else if (tool === 'text') document.getElementById('textTool').classList.add('active');
      }

      function applyColorToSelection(color) {
        const active = canvas.getActiveObject();
        if (!active || active === canvas.backgroundImage) return;
        if (active.type === 'textbox' || active.type === 'text') {
          active.set({ fill: color });
        } else if (active.type === 'path' || active.type === 'group') {
          active.set({ stroke: color });
        }
        canvas.renderAll();
      }

      // еӣҫзүҮз®ЎзҗҶ
      function addImageFromBlob(blob, url) {
        const id = 'img_' + (++imageCounter);
        project.images[id] = { blob, thumbnailUrl: url, state: null, fitMode: 'contain' };
        if (!project.currentId) { project.currentId = id; loadImageToCanvas(id); }
        renderThumbnails();
      }

      function loadImageToCanvas(id) {
        const imgData = project.images[id];
        if (!imgData) return;
        currentFitMode = imgData.fitMode || 'contain';
        const thisRequestId = ++loadRequestId;
        canvas.clear(); canvas.backgroundColor = 'white';
        fabric.Image.fromURL(imgData.thumbnailUrl, (img) => {
          if (thisRequestId !== loadRequestId) return;
          applyFit(img);
          canvas.renderAll();
          if (imgData.state) {
            fabric.util.enlivenObjects(imgData.state, (objs) => {
              if (thisRequestId !== loadRequestId) return;
              objs.forEach(o => canvas.add(o));
              canvas.renderAll();
            });
          }
        }, { crossOrigin: 'anonymous' });
        project.currentId = id;
        renderThumbnails();
      }

      function applyFit(bgImg) {
        bgImg.set({ selectable: false, evented: false });
        const scale = currentFitMode === 'cover' ?
          Math.max(EDIT_SIZE/bgImg.width, EDIT_SIZE/bgImg.height) :
          Math.min(EDIT_SIZE/bgImg.width, EDIT_SIZE/bgImg.height);
        bgImg.scaleX = scale; bgImg.scaleY = scale;
        bgImg.left = (EDIT_SIZE - bgImg.width*scale)/2;
        bgImg.top = (EDIT_SIZE - bgImg.height*scale)/2;
        canvas.backgroundImage = bgImg;
      }

      function saveCurrentState() {
        if (!project.currentId) return;
        const objs = canvas.getObjects().filter(o => o !== canvas.backgroundImage);
        project.images[project.currentId].state = objs.map(o => o.toJSON());
        project.images[project.currentId].fitMode = currentFitMode;
      }

      function switchImage(id) {
        if (id === project.currentId) return;
        saveCurrentState();
        loadImageToCanvas(id);
      }

      function deleteImage(id) {
        if (!confirm('зЎ®е®ҡеҲ йҷӨиҝҷеј еӣҫзүҮеҸҠе…¶зј–иҫ‘еҗ—пјҹ')) return;
        if (project.currentId === id) {
          saveCurrentState();
          canvas.clear(); canvas.backgroundImage = null;
          project.currentId = null;
        }
        URL.revokeObjectURL(project.images[id].thumbnailUrl);
        delete project.images[id];
        const remaining = Object.keys(project.images);
        if (remaining.length) loadImageToCanvas(remaining[0]);
        else { canvas.clear(); canvas.backgroundImage = null; canvas.renderAll(); }
        renderThumbnails();
      }

      function renderThumbnails() {
        const container = document.getElementById('thumbList');
        container.innerHTML = '';
        for (const [id, data] of Object.entries(project.images)) {
          const div = document.createElement('div');
          div.className = 'thumb-item' + (id === project.currentId ? ' active' : '');
          div.innerHTML = `<img src="${data.thumbnailUrl}" alt=""><button class="delete-btn">Г—</button>`;
          div.querySelector('img').onclick = () => switchImage(id);
          div.querySelector('.delete-btn').onclick = (e) => { e.stopPropagation(); deleteImage(id); };
          container.appendChild(div);
        }
      }

      function handleFiles(files) {
        Array.from(files).forEach(f => {
          if (f.type.startsWith('image/')) addImageFromBlob(f, URL.createObjectURL(f));
        });
      }

      document.addEventListener('dragover', e => e.preventDefault());
      document.addEventListener('drop', e => {
        e.preventDefault();
        if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
      });
      document.getElementById('addImageBtn').onclick = () => {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*'; input.multiple = true;
        input.onchange = () => { if (input.files.length) handleFiles(input.files); };
        input.click();
      };
      document.addEventListener('paste', e => {
        for (let item of e.clipboardData?.items || []) {
          if (item.type.startsWith('image/')) {
            const blob = item.getAsFile();
            addImageFromBlob(blob, URL.createObjectURL(blob));
          }
        }
      });

      // иҙҙзәё/йўңж–Үеӯ—ж·»еҠ 
      function addSticker(pathData) {
        const path = new fabric.Path(pathData, {
          stroke: drawingColor, fill: 'rgba(0,0,0,0)', strokeWidth: 2,
          left: EDIT_SIZE/2, top: EDIT_SIZE/2, originX: 'center', originY: 'center',
          scaleX: 1.5, scaleY: 1.5,
        });
        canvas.add(path); canvas.setActiveObject(path); canvas.renderAll();
      }

      function addKaomoji(text) {
        const textbox = new fabric.Textbox(text, {
          left: EDIT_SIZE/2, top: EDIT_SIZE/2, originX: 'center', originY: 'center',
          fontSize: 30, fontFamily: 'sans-serif', fill: drawingColor,
          textAlign: 'center', editable: true,
        });
        canvas.add(textbox); canvas.setActiveObject(textbox); canvas.renderAll();
      }

      function renderStickers(containerId) {
        const grid = document.getElementById(containerId);
        if (!grid) return;
        grid.innerHTML = '';
        getSelectedStickers().forEach(def => {
          const btn = document.createElement('div');
          btn.className = 'sticker-btn';
          btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="${def.path}" stroke="black" fill="none" stroke-width="2"/></svg>`;
          btn.title = def.name;
          btn.onclick = () => addSticker(def.path);
          grid.appendChild(btn);
        });
      }

      function renderKaomoji(containerId) {
        const grid = document.getElementById(containerId);
        if (!grid) return;
        grid.innerHTML = '';
        getSelectedKaomoji().forEach(k => {
          const btn = document.createElement('button');
          btn.className = 'kaomoji-btn';
          btn.textContent = k;
          btn.onclick = () => addKaomoji(k);
          grid.appendChild(btn);
        });
      }

      renderStickers('stickerGrid');
      renderKaomoji('kaomojiGrid');

      // ========== йҖүжӢ©зҙ жқҗжЁЎжҖҒжЎҶ ==========
      const selectModal = document.getElementById('selectModal');
      const selectContent = document.getElementById('selectContent');
      const selectModalTitle = document.getElementById('selectModalTitle');
      let currentSelectType = '';

      function openSelectModal(type) {
        currentSelectType = type;
        selectContent.innerHTML = '';
        if (type === 'sticker') {
          selectModalTitle.textContent = 'йҖүжӢ©иҙҙзәёпјҲеӢҫйҖүдҪ е–ңж¬ўзҡ„пјү';
          const grid = document.createElement('div');
          grid.className = 'select-grid';
          fullStickerLibrary.forEach((def, i) => {
            const item = document.createElement('div');
            item.className = 'select-item';
            item.innerHTML = `<input type="checkbox" id="sticker_${i}" ${userSelection.stickers.includes(i) ? 'checked' : ''}>
              <label for="sticker_${i}">${def.name}</label>`;
            grid.appendChild(item);
          });
          selectContent.appendChild(grid);
        } else {
          selectModalTitle.textContent = 'йҖүжӢ©йўңж–Үеӯ—пјҲеӢҫйҖүдҪ е–ңж¬ўзҡ„пјү';
          const grid = document.createElement('div');
          grid.className = 'select-grid';
          fullKaomojiLibrary.forEach((k, i) => {
            const item = document.createElement('div');
            item.className = 'select-item';
            item.innerHTML = `<input type="checkbox" id="kaomoji_${i}" ${userSelection.kaomoji.includes(i) ? 'checked' : ''}>
              <label for="kaomoji_${i}">${k}</label>`;
            grid.appendChild(item);
          });
          selectContent.appendChild(grid);
        }
        selectModal.classList.add('open');
      }

      function applySelection() {
        if (currentSelectType === 'sticker') {
          const newSelection = [];
          fullStickerLibrary.forEach((_, i) => {
            const cb = document.getElementById('sticker_' + i);
            if (cb && cb.checked) newSelection.push(i);
          });
          userSelection.stickers = newSelection;
        } else if (currentSelectType === 'kaomoji') {
          const newSelection = [];
          fullKaomojiLibrary.forEach((_, i) => {
            const cb = document.getElementById('kaomoji_' + i);
            if (cb && cb.checked) newSelection.push(i);
          });
          userSelection.kaomoji = newSelection;
        }
        saveSelection();
        renderStickers('stickerGrid');
        renderKaomoji('kaomojiGrid');
        selectModal.classList.remove('open');
      }

      document.getElementById('selectStickersBtn').onclick = () => openSelectModal('sticker');
      document.getElementById('selectKaomojiBtn').onclick = () => openSelectModal('kaomoji');
      document.getElementById('applySelectBtn').onclick = applySelection;
      document.getElementById('cancelSelectBtn').onclick = () => selectModal.classList.remove('open');

      // е·Ҙе…·ж ҸдәӢд»¶
      document.getElementById('selectTool').onclick = () => setTool('select');
      document.getElementById('brushTool').onclick = () => setTool('brush');
      document.getElementById('textTool').onclick = () => {
        setTool('select');
        const tb = new fabric.Textbox('еҸҢеҮ»зј–иҫ‘', {
          left: EDIT_SIZE/2, top: EDIT_SIZE/2, originX: 'center', originY: 'center',
          fontSize: 28, fontFamily: 'sans-serif', fill: drawingColor, editable: true,
        });
        canvas.add(tb); canvas.setActiveObject(tb); canvas.renderAll();
      };
      document.getElementById('colorPicker').oninput = e => {
        drawingColor = e.target.value;
        if (currentTool === 'brush' && canvas.freeDrawingBrush?.color) {
          canvas.freeDrawingBrush.color = drawingColor;
        }
        applyColorToSelection(drawingColor);
      };
      document.getElementById('brushSize').oninput = e => {
        brushThickness = parseInt(e.target.value);
        if (canvas.freeDrawingBrush) canvas.freeDrawingBrush.width = brushThickness;
      };
      document.getElementById('fitModeBtn').onclick = () => {
        currentFitMode = currentFitMode === 'contain' ? 'cover' : 'contain';
        document.getElementById('fitModeBtn').textContent = currentFitMode === 'contain' ? 'рҹ“җ йҖӮеә”' : 'рҹ“җ еЎ«е……';
        if (canvas.backgroundImage) { applyFit(canvas.backgroundImage); canvas.renderAll(); }
        if (project.currentId) project.images[project.currentId].fitMode = currentFitMode;
      };
      document.getElementById('deleteSelectedBtn').onclick = () => {
        const active = canvas.getActiveObject();
        if (active && active !== canvas.backgroundImage) {
          canvas.remove(active); canvas.renderAll();
        } else {
          alert('иҜ·е…ҲйҖүдёӯдёҖдёӘж¶ӮйёҰгҖҒж–Үеӯ—жҲ–иҙҙзәё');
        }
      };

      canvas.on('mouse:dblclick', (opt) => {
        const target = canvas.findTarget(opt.e, false);
        if (!target || target === canvas.backgroundImage) {
          const pointer = canvas.getPointer(opt.e);
          const tb = new fabric.Textbox('ж–Үеӯ—', {
            left: pointer.x, top: pointer.y, fontSize: 28, fontFamily: 'sans-serif',
            fill: drawingColor, editable: true,
          });
          canvas.add(tb); canvas.setActiveObject(tb); canvas.renderAll();
        }
      });

      // Prompt еә“еҠҹиғҪ
      const promptModal = document.getElementById('promptModal');
      const promptList = document.getElementById('promptList');
      function showPromptLibrary() {
        promptList.innerHTML = '';
        promptLibrary.forEach((prompt, index) => {
          const div = document.createElement('div');
          div.className = 'prompt-item';
          div.textContent = `${index + 1}. ${prompt}`;
          div.onclick = () => {
            navigator.clipboard.writeText(prompt).then(() => {
              alert('Prompt е·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝпјҒ');
            }).catch(() => {
              alert('еӨҚеҲ¶еӨұиҙҘпјҢиҜ·жүӢеҠЁеӨҚеҲ¶');
            });
          };
          promptList.appendChild(div);
        });
        promptModal.classList.add('open');
      }
      document.getElementById('promptLibraryBtn').onclick = showPromptLibrary;
      document.getElementById('closePromptBtn').onclick = () => promptModal.classList.remove('open');
      promptModal.addEventListener('click', (e) => {
        if (e.target === promptModal) promptModal.classList.remove('open');
      });

      // еҜјеҮәжЁЎжҖҒжЎҶ
      const exportModal = document.getElementById('exportModal');
      const exportSizeSelect = document.getElementById('exportSizeSelect');
      let resolveExportSize;

      function showExportSizeDialog() {
        return new Promise((resolve) => {
          exportModal.classList.add('open');
          resolveExportSize = resolve;
        });
      }

      document.getElementById('cancelExportBtn').onclick = () => {
        exportModal.classList.remove('open');
        if (resolveExportSize) resolveExportSize(null);
      };

      document.getElementById('confirmExportBtn').onclick = () => {
        const size = exportSizeSelect.value;
        exportModal.classList.remove('open');
        if (resolveExportSize) resolveExportSize(size);
      };

      async function exportCurrent() {
        if (!project.currentId) return alert('иҜ·е…Ҳж·»еҠ еӣҫзүҮ');
        saveCurrentState();
        const imgData = project.images[project.currentId];
        if (!imgData) return;
        const sizeStr = await showExportSizeDialog();
        if (!sizeStr) return;
        const originalUrl = URL.createObjectURL(imgData.blob);
        let targetSize;
        if (sizeStr === 'original') {
          const dims = await new Promise(resolve => {
            const img = new Image();
            img.onload = () => resolve({ width: img.width, height: img.height });
            img.src = originalUrl;
          });
          targetSize = Math.max(dims.width, dims.height);
        } else {
          targetSize = parseInt(sizeStr);
        }
        const dataUrl = await renderHighQuality(imgData, targetSize, originalUrl);
        URL.revokeObjectURL(originalUrl);
        downloadDataUrl(dataUrl, `emoji_${project.currentId}.png`);
      }

      async function exportAllZip() {
        if (!Object.keys(project.images).length) return alert('жІЎжңүеӣҫзүҮ');
        if (typeof JSZip === 'undefined') return alert('жү“еҢ…з»„д»¶жңӘеҠ иҪҪ');
        saveCurrentState();
        const sizeStr = await showExportSizeDialog();
        if (!sizeStr) return;
        const zip = new JSZip();
        for (const id of Object.keys(project.images)) {
          const imgData = project.images[id];
          if (!imgData) continue;
          const originalUrl = URL.createObjectURL(imgData.blob);
          let targetSize;
          if (sizeStr === 'original') {
            const dims = await new Promise(resolve => {
              const img = new Image();
              img.onload = () => resolve({ width: img.width, height: img.height });
              img.src = originalUrl;
            });
            targetSize = Math.max(dims.width, dims.height);
          } else {
            targetSize = parseInt(sizeStr);
          }
          const dataUrl = await renderHighQuality(imgData, targetSize, originalUrl);
          URL.revokeObjectURL(originalUrl);
          zip.file(`emoji_${id}.png`, dataUrl.split(',')[1], { base64: true });
        }
        const blob = await zip.generateAsync({ type: 'blob' });
        downloadBlob(blob, 'иЎЁжғ…еҢ…жү“еҢ….zip');
      }

      // йҮҚеҶҷеҜјеҮәжёІжҹ“пјҡе§Ӣз»Ҳе…ҲеңЁ600дёҠжёІжҹ“пјҢеҶҚзј©ж”ҫеҲ°зӣ®ж Үе°әеҜёпјҢдҝқиҜҒеҶ…е®№е®Ңж•ҙ
      function renderHighQuality(imgData, targetSize, imageUrl) {
        return new Promise((resolve) => {
          const offCanvas = new fabric.StaticCanvas(null, {
            width: targetSize,
            height: targetSize,
            backgroundColor: 'white',
          });
          const scaleFactor = targetSize / EDIT_SIZE;
          fabric.Image.fromURL(imageUrl, (bgImg) => {
            const fit = imgData.fitMode || 'contain';
            const bgScale = fit === 'cover' ?
              Math.max(targetSize / bgImg.width, targetSize / bgImg.height) :
              Math.min(targetSize / bgImg.width, targetSize / bgImg.height);
            bgImg.set({
              left: (targetSize - bgImg.width * bgScale) / 2,
              top: (targetSize - bgImg.height * bgScale) / 2,
              scaleX: bgScale,
              scaleY: bgScale,
            });
            offCanvas.backgroundImage = bgImg;
            if (imgData.state) {
              fabric.util.enlivenObjects(imgData.state, (objs) => {
                objs.forEach(o => {
                  // еҲӨж–ӯеҜ№иұЎзұ»еһӢпјҢж–Үеӯ—еҜ№иұЎеҸӘзј©ж”ҫеӯ—дҪ“е’ҢдҪҚзҪ®пјҢйҒҝе…ҚеҸҢйҮҚзј©ж”ҫ
                  if (o.type === 'textbox' || o.type === 'text') {
                    o.set({
                      left: o.left * scaleFactor,
                      top: o.top * scaleFactor,
                      fontSize: (o.fontSize || 20) * scaleFactor,
                      // дҝқжҢҒ scaleX/scaleY дёә 1пјҢдёҚйўқеӨ–зј©ж”ҫ
                      scaleX: 1,
                      scaleY: 1,
                    });
                  } else {
                    // зҹўйҮҸеҜ№иұЎпјҡи·Ҝеҫ„гҖҒиҙҙзәёзӯү
                    o.set({
                      left: o.left * scaleFactor,
                      top: o.top * scaleFactor,
                      scaleX: (o.scaleX || 1) * scaleFactor,
                      scaleY: (o.scaleY || 1) * scaleFactor,
                      strokeWidth: (o.strokeWidth || 1) * scaleFactor,
                    });
                  }
                  offCanvas.add(o);
                });
                offCanvas.renderAll();
                const dataUrl = offCanvas.toDataURL({ format: 'png' });
                offCanvas.dispose();
                resolve(dataUrl);
              });
            } else {
              offCanvas.renderAll();
              const dataUrl = offCanvas.toDataURL({ format: 'png' });
              offCanvas.dispose();
              resolve(dataUrl);
            }
          }, { crossOrigin: 'anonymous' });
        });
      }
 
 

      function downloadDataUrl(url, name) {
        const a = document.createElement('a'); a.href = url; a.download = name; a.click();
      }
      function downloadBlob(blob, name) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = name; a.click();
        URL.revokeObjectURL(url);
      }

      document.getElementById('exportCurrentBtn').onclick = exportCurrent;
      document.getElementById('exportAllBtn').onclick = exportAllZip;

      window.addEventListener('keydown', e => {
        if (e.key === 'Delete' || e.key === 'Backspace') {
          if (document.activeElement?.tagName === 'INPUT' || document.activeElement?.tagName === 'TEXTAREA') return;
          const active = canvas.getActiveObject();
          if (active && active !== canvas.backgroundImage) {
            canvas.remove(active); canvas.renderAll(); e.preventDefault();
          }
        }
      });

      // з§»еҠЁз«Ҝ
      function isMobile() { return window.innerWidth <= 768; }
      function setupMobile() {
        const mStickers = document.getElementById('mobileStickersBtn');
        const mKaomoji = document.getElementById('mobileKaomojiBtn');
        if (isMobile()) {
          mStickers.style.display = 'inline-flex';
          mKaomoji.style.display = 'inline-flex';
          document.getElementById('rightPanel').style.display = 'none';
        } else {
          mStickers.style.display = 'none';
          mKaomoji.style.display = 'none';
          document.getElementById('rightPanel').style.display = '';
          document.getElementById('mobileDrawer').classList.remove('open');
        }
      }
      window.addEventListener('resize', setupMobile);
      setupMobile();

      const drawer = document.getElementById('mobileDrawer');
      document.getElementById('mobileStickersBtn').onclick = () => {
        drawer.innerHTML = '<h3>иҙҙзәё</h3><div class="sticker-grid" id="mobileStickerGrid"></div><button class="tool-btn" style="margin-top:10px;width:100%;" onclick="document.getElementById(\'mobileDrawer\').classList.remove(\'open\')">е…ій—ӯ</button>';
        drawer.classList.add('open');
        setTimeout(() => renderStickers('mobileStickerGrid'), 50);
      };
      document.getElementById('mobileKaomojiBtn').onclick = () => {
        drawer.innerHTML = '<h3>йўңж–Үеӯ—</h3><div class="kaomoji-grid" id="mobileKaomojiGrid"></div><button class="tool-btn" style="margin-top:10px;width:100%;" onclick="document.getElementById(\'mobileDrawer\').classList.remove(\'open\')">е…ій—ӯ</button>';
        drawer.classList.add('open');
        setTimeout(() => renderKaomoji('mobileKaomojiGrid'), 50);
      };
      drawer.onclick = e => { if (e.target === drawer) drawer.classList.remove('open'); };

      setTool('select');
      console.log('рҹҺЁ иЎЁжғ…еҢ…е·ҘеқҠ - еҜјеҮәйҳІиЈҒеүӘ + Prompt еә“');
    }

    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      setTimeout(initApp, 10);
    } else {
      document.addEventListener('DOMContentLoaded', () => setTimeout(initApp, 10));
    }
  })();
</script>
